<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>⚡ QUEST 2026 — Rômulo</title>

<style>
:root {
  --bg-deep: #0a0a14;
  --bg-mid: #12121f;
  --bg-card: rgba(255,255,255,0.03);
  --bg-card-hover: rgba(255,255,255,0.055);
  --border: rgba(255,255,255,0.06);
  --text-primary: #e8ecf4;
  --text-secondary: #8892a8;
  --text-muted: #555e72;
  --accent-indigo: #7c7ff9;
  --accent-purple: #b97cfa;
  --accent-pink: #f472b6;
  --accent-green: #34d399;
  --accent-amber: #fbbf24;
  --accent-red: #f87171;
  --saude: #34d399;
  --carreira: #7c7ff9;
  --ingles: #fbbf24;
  --foco: #f472b6;
  --conexoes: #b97cfa;
  --font-main: 'Outfit', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,127,249,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(244,114,182,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 16px 60px; }

/* ===== SYNC STATUS ===== */
.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 10px;
  border-radius: 99px;
  transition: all 0.3s;
}

.sync-status.online { color: var(--accent-green); background: rgba(52,211,153,0.1); }
.sync-status.offline { color: var(--accent-amber); background: rgba(251,191,36,0.1); }
.sync-status.syncing { color: var(--accent-indigo); background: rgba(124,127,249,0.1); }
.sync-status.error { color: var(--accent-red); background: rgba(248,113,113,0.1); }

.sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  display: inline-block;
}

.sync-status.online .sync-dot { background: var(--accent-green); }
.sync-status.offline .sync-dot { background: var(--accent-amber); }
.sync-status.syncing .sync-dot { background: var(--accent-indigo); animation: pulse 1s infinite; }
.sync-status.error .sync-dot { background: var(--accent-red); }

@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ===== HEADER ===== */
.header {
  padding: 28px 0 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.brand h1 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple), var(--accent-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-sub {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}

.brand-sub p {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.week-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

.week-nav .label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 700;
  margin-right: 4px;
}

.week-nav button {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);

  align-items: center;
  justify-content: center;

}

.week-nav button:hover { background: var(--bg-card-hover); color: var(--text-primary); }

.week-num {

  font-weight: 700;
  color: var(--accent-purple);
  min-width: 36px;
  text-align: center;
}

/* ===== LEVEL BAR ===== */
.level-section { margin-top: 18px; }

.level-info {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}

.level-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.level-badge .badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
  color: #fff;
  padding: 3px 10px;
  border-radius: 6px;
}

.level-badge .name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text-primary);
}

.xp-count {

  font-size: 13px;
  color: var(--text-secondary);

}

.xp-count span { color: var(--text-muted); }

.xp-float {

  right: 0;

  font-weight: 700;
  font-size: 14px;

}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-22px); }
}

.level-bar {

.level-bar-fill {

/* ===== STAT CARDS ===== */
.stats {

.stat-card {

}

.stat-card:hover { background: var(--bg-card-hover); transform: translateY(-1px); }
.stat-card .stat-icon { font-size: 16px; margin-bottom: 4px; }
.stat-card .stat-value { font-family: var(--font-mono); font-size: 20px; font-weight: 800; color: var(--text-primary); }
.stat-card .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-top: 2px; }

/* ===== TABS ===== */
.tabs {

  gap: 0;
  margin-top: 24px;
  background: var(--bg-card);
  border-radius: var(--radius);

.tab-btn {

  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;

}

.tab-btn.active {

  color: var(--accent-purple);
}

.tab-btn:hover:not(.active) { color: var(--text-secondary); }

/* ===== TRACKER ===== */
.tab-content { margin-top: 20px; }

.category-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 14px;
  transition: all 0.2s;
}

.category-card:hover { border-color: rgba(255,255,255,0.1); }

.cat-header {
  display: flex;

  padding: 14px 18px;

.cat-header-left {

.cat-header-left .cat-icon { font-size: 20px; }

.table-scroll { overflow-x: auto; }

.tracker-table th:first-child { padding-left: 18px; text-align: left; }
.tracker-table th.today-col { color: var(--accent-purple); }

.tracker-table td {
  padding: 7px 6px;
  text-align: center;

}

.tracker-table td:first-child {
  padding-left: 18px;
  text-align: left;
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 500;
}

.task-xp {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-left: 6px;
}

.check-btn {
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 2px solid rgba(255,255,255,0.1);
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;

}

.check-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }

.check-btn.checked {
  border: none;
  animation: checkPop 0.25s ease;
}

@keyframes checkPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }

}

}

.td-xp {

  font-size: 13px;
  font-weight: 800;
  padding-right: 14px !important;
}

/* ===== ROADMAP ===== */
.roadmap { padding-left: 28px; position: relative; }

.roadmap-line {
  position: absolute;
  left: 13px;
  top: 10px;
  bottom: 10px;

  border-radius: 2px;
}

.milestone { position: relative; margin-bottom: 24px; }

.milestone-dot {
  position: absolute;

}

.milestone-card {

}

.milestone-item {

/* ===== RULES ===== */
.rule-card {

  border: 1px solid var(--border);
  border-radius: var(--radius);

  margin-bottom: 12px;
}

.rule-card h3 {
  font-size: 15px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.rule-card p {
  font-size: 13px;
  color: var(--text-secondary);

}

/* ===== EXPORT BAR ===== */
.export-bar {
  display: flex;
  gap: 8px;
  margin-top: 20px;

}

.export-btn {
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-main);

  font-weight: 700;

  transition: all 0.15s;

}

.export-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: rgba(255,255,255,0.12); }
.export-btn.danger { border-color: rgba(248,113,113,0.2); color: var(--accent-red); }
.export-btn.danger:hover { background: rgba(248,113,113,0.08); }

/* ===== SETUP SCREEN ===== */
.setup-screen {
  max-width: 500px;
  margin: 60px auto;
  padding: 0 20px;
}

.setup-card {
  background: var(--bg-card);

}

.setup-card h2 {
  font-size: 20px;

  background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}

.setup-card p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 16px;
}

.setup-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.04);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 13px;
  margin-bottom: 12px;

.setup-input:focus { border-color: var(--accent-indigo); }
.setup-input::placeholder { color: var(--text-muted); }

.setup-label {

.setup-btn {

.setup-skip {

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 24px;

/* ===== RESPONSIVE ===== */

<script>
// =============================================
// QUEST 2026 — Supabase + Offline Fallback
// =============================================

// ===== CONFIGURAÇÃO SUPABASE =====
const CONFIG_KEY = 'quest2026_config';
const LOCAL_KEY = 'quest2026_data';
const PENDING_KEY = 'quest2026_pending';

let supabaseUrl = 'https://tptgkwnyazxliiqikipp.supabase.co';
let supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwdGdrd255YXp4bGlpcWlraXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTk3NzUsImV4cCI6MjA5MDkzNTc3NX0.3YEyh-X86vSsbM2LjulW_iVlKg77Ky6P3TaPFkF2nzw';
let isOnline = false;
let isSyncing = false;

// === SUAS CREDENCIAIS AQUI ===
const EMBEDDED_URL = 'https://tptgkwnyazxliiqikipp.supabase.co';  // Cole sua URL: 'https://xxxxx.supabase.co'
const EMBEDDED_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwdGdrd255YXp4bGlpcWlraXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNTk3NzUsImV4cCI6MjA5MDkzNTc3NX0.3YEyh-X86vSsbM2LjulW_iVlKg77Ky6P3TaPFkF2nzw';  // Cole sua anon key: 'eyJhbGciOi...'
// =============================

function loadConfig() {
  if (EMBEDDED_URL && EMBEDDED_KEY) {
    supabaseUrl = EMBEDDED_URL;
    supabaseKey = EMBEDDED_KEY;
    return true;
  }
  try {
    const cfg = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
    supabaseUrl = cfg.url || '';
    supabaseKey = cfg.key || '';
    return !!(supabaseUrl && supabaseKey);
  } catch { return false; }
}

function saveConfig(url, key) {
  supabaseUrl = url.replace(/\/$/, '');
  supabaseKey = key;
  localStorage.setItem(CONFIG_KEY, JSON.stringify({ url: supabaseUrl, key: supabaseKey }));
}

// ===== SUPABASE REST API =====
async function supaFetch(table, method, params = {}) {
  if (!supabaseUrl || !supabaseKey) return null;
  
  let url = `${supabaseUrl}/rest/v1/${table}`;
  const headers = {
    'apikey': supabaseKey,
    'Authorization': `Bearer ${supabaseKey}`,
    'Content-Type': 'application/json',
    'Prefer': method === 'POST' ? 'resolution=merge-duplicates,return=minimal' : 'return=minimal'
  };

  const opts = { method, headers };

  if (params.query) {
    url += '?' + params.query;
  }

  if (params.body) {
    opts.body = JSON.stringify(params.body);
  }

  try {
    const res = await fetch(url, opts);
    if (!res.ok) throw new Error(`${res.status}`);
    const text = await res.text();
    return text ? JSON.parse(text) : true;
  } catch (e) {
    console.warn('Supabase fetch error:', e);
    return null;
  }
}

async function testConnection() {
  if (!supabaseUrl || !supabaseKey) return false;
  try {
    const res = await fetch(`${supabaseUrl}/rest/v1/quest_meta?key=eq.current_week&select=*`, {
      headers: {
        'apikey': supabaseKey,
        'Authorization': `Bearer ${supabaseKey}`,
      }
    });
    return res.ok;
  } catch { return false; }
}

// ===== SYNC ENGINE =====
async function pullFromCloud() {
  if (!supabaseUrl) return null;
  
  try {
    // Fetch all checks
    const checks = await supaFetch('quest_checks', 'GET', {
      query: 'select=week_num,day_index,task_id,completed'
    });

    // Fetch meta
    const meta = await supaFetch('quest_meta', 'GET', {
      query: 'select=key,value'
    });

    if (!checks || !meta) return null;

    // Convert to local format
    const weeks = {};
    checks.forEach(row => {
      if (!weeks[row.week_num]) weeks[row.week_num] = {};
      weeks[row.week_num][`${row.day_index}-${row.task_id}`] = row.completed;
    });

    const currentWeek = parseInt((meta.find(m => m.key === 'current_week') || {}).value || '1');

    return { weeks, currentWeek };
  } catch (e) {
    console.warn('Pull error:', e);
    return null;
  }
}

async function pushToCloud(weekNum, key, completed) {
  if (!supabaseUrl) {
    addPending({ weekNum, key, completed });
    return;
  }

  const parts = key.split('-');
  const dayIndex = parseInt(parts[0]);
  const taskId = parts.slice(1).join('-');

  if (completed) {
    const res = await supaFetch('quest_checks', 'POST', {
      body: { week_num: weekNum, day_index: dayIndex, task_id: taskId, completed: true }
    });
    if (!res) addPending({ weekNum, key, completed });
  } else {
    const res = await supaFetch('quest_checks', 'DELETE', {
      query: `week_num=eq.${weekNum}&day_index=eq.${dayIndex}&task_id=eq.${taskId}`
    });
    if (!res) addPending({ weekNum, key, completed });
  }
}

async function pushMetaToCloud(key, value) {
  if (!supabaseUrl) return;
  await supaFetch('quest_meta', 'POST', {
    body: { key, value: String(value) }
  });
}

function addPending(op) {
  const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
  pending.push({ ...op, timestamp: Date.now() });
  localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
}

async function flushPending() {
  const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
  if (pending.length === 0) return;
  
  const remaining = [];
  for (const op of pending) {
    const parts = op.key.split('-');
    const dayIndex = parseInt(parts[0]);
    const taskId = parts.slice(1).join('-');

    let success;
    if (op.completed) {
      success = await supaFetch('quest_checks', 'POST', {
        body: { week_num: op.weekNum, day_index: dayIndex, task_id: taskId, completed: true }
      });
    } else {
      success = await supaFetch('quest_checks', 'DELETE', {
        query: `week_num=eq.${op.weekNum}&day_index=eq.${dayIndex}&task_id=eq.${taskId}`
      });
    }
    if (!success) remaining.push(op);
  }
  localStorage.setItem(PENDING_KEY, JSON.stringify(remaining));
}

async function fullSync() {
  if (!supabaseUrl || isSyncing) return;
  isSyncing = true;
  updateSyncStatus('syncing');

  try {
    // First flush pending operations
    await flushPending();

    // Pull from cloud
    const cloudData = await pullFromCloud();
    if (cloudData) {
      // Merge: cloud wins for existing data, local fills gaps
      const localData = loadLocalState();
      const merged = { ...localData, weeks: { ...localData.weeks } };

      Object.entries(cloudData.weeks).forEach(([wk, checks]) => {
        if (!merged.weeks[wk]) merged.weeks[wk] = {};
        Object.entries(checks).forEach(([key, val]) => {
          merged.weeks[wk][key] = val;
        });
      });

      state = { ...merged, activeTab: state.activeTab };
      saveLocalState(state);
      isOnline = true;
      updateSyncStatus('online');
    } else {
      updateSyncStatus('error');
    }
  } catch (e) {
    console.warn('Sync error:', e);
    updateSyncStatus('error');
  }
  
  isSyncing = false;
  render();
}

function updateSyncStatus(status) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const labels = { online: '● Sincronizado', offline: '● Modo Offline', syncing: '● Sincronizando...', error: '● Erro de conexão' };
  el.className = `sync-status ${status}`;
  el.innerHTML = `<span class="sync-dot"></span>${labels[status] || ''}`;
}

// ===== CALCULATIONS =====
function getWeekChecks(wk) { return state.weeks[wk] || {}; }

function calcWeekXP(wk) {
  const checks = getWeekChecks(wk);
  let xp = 0;
  Object.entries(checks).forEach(([key, done]) => {
    if (!done) return;
    const taskId = key.split('-').slice(1).join('-');
    for (const cat of Object.values(CATEGORIES)) {
      const task = cat.tasks.find(t => t.id === taskId);
      if (task) { xp += task.xp; break; }
    }
  });
  return xp;
}

function calcTotalXP() {
  return Object.keys(state.weeks).reduce((sum, wk) => sum + calcWeekXP(parseInt(wk)), 0);
}

function getLevel(xp) {
  let current = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.minXP) current = l; else break; }
  const ni = LEVELS.findIndex(l => l.level === current.level) + 1;
  return { current, next: ni < LEVELS.length ? LEVELS[ni] : null };
}

function calcStreaks(wk) {
  const checks = getWeekChecks(wk);
  const s = {};
  Object.keys(CATEGORIES).forEach(ck => {
    let streak = 0;
    for (let d = 0; d < 7; d++) {
      if (CATEGORIES[ck].tasks.some(t => checks[`${d}-${t.id}`])) streak++;
      else streak = 0;
    }
    s[ck] = streak;
  });
  return s;
}

function todayIdx() { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; }

function todayPct(wk) {
  const checks = getWeekChecks(wk);
  const di = todayIdx();
  let total = 0, done = 0;
  Object.values(CATEGORIES).forEach(cat => {
    cat.tasks.forEach(t => { total++; if (checks[`${di}-${t.id}`]) done++; });
  });
  return total ? Math.round((done / total) * 100) : 0;
}

function exportCSV() {
  let csv = 'Semana,Dia,Categoria,Tarefa,XP_Possível,Concluída,XP_Ganho\n';
  Object.entries(state.weeks).forEach(([wk, checks]) => {
    DAYS.forEach((day, di) => {
      Object.entries(CATEGORIES).forEach(([, cat]) => {
        cat.tasks.forEach(task => {
          const done = checks[`${di}-${task.id}`] ? 1 : 0;
          csv += `${wk},${day},${cat.label},${task.label},${task.xp},${done},${done * task.xp}\n`;
        });
      });
    });
  });
  dl(new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' }), `quest2026_${fmtDate()}.csv`);
  showToast('📊 CSV exportado!');
}

function dl(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function fmtDate() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.weeks && confirm('Substituir todos os dados atuais?')) {
          state.weeks = data.weeks;
          state.currentWeek = data.currentWeek || 1;
          saveLocalState(state);
          // Push everything to cloud
          if (supabaseUrl) syncFullPush();
          render();
          showToast('✅ Dados importados!');
        }
      } catch(err) { alert('Erro: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

async function syncFullPush() {
  // Push all local data to cloud
  for (const [wk, checks] of Object.entries(state.weeks)) {
    for (const [key, val] of Object.entries(checks)) {
      if (val) {
        const parts = key.split('-');
        await supaFetch('quest_checks', 'POST', {
          body: { week_num: parseInt(wk), day_index: parseInt(parts[0]), task_id: parts.slice(1).join('-'), completed: true }
        });
      }
    }
  }
}

function toggleCheck(weekNum, key, xp) {
  const checks = getWeekChecks(weekNum);
  const wasChecked = checks[key];
  
  if (!state.weeks[weekNum]) state.weeks[weekNum] = {};
  state.weeks[weekNum][key] = !wasChecked;
  
  if (!state.weeks[weekNum][key]) delete state.weeks[weekNum][key];
  
  saveLocalState(state);
  pushToCloud(weekNum, key, !wasChecked);
  render();

  if (!wasChecked) {
    const anchor = document.getElementById('xp-float-anchor');
    if (anchor) {
      const f = document.createElement('div');
      f.className = 'xp-float';
      f.textContent = `+${xp}`;
      anchor.appendChild(f);
      setTimeout(() => f.remove(), 1000);
    }
  }
}

    { title: '🔥 Streaks', lines: ['1+ tarefa da categoria por dia consecutivo = streak.', 'Quebrou? Recomeça sem culpa. Streaks motivam, não obrigam.'] },
    { title: '📅 Rotina Sugerida', lines: ['Seg/Ter/Qui — Academia + 25min inglês + 1h estudo à noite', 'Qua (home office) — Cozinhar + 25min inglês + estudo se sobrar', 'Sex — Dia leve. Avaliação neuro + inglês + descanso', 'Sáb — Bloco de estudo (1h30-2h) + projeto pessoal', 'Dom — Cozinhar + descanso + imersão inglês leve'] },
    { title: '🛡️ Regras de Ouro', lines: ['SONO: 7-8h inegociáveis. Nunca troque sono por estudo.', '2 MINUTOS: Abra o material por 2 min só. O difícil é começar.', 'SEM CULPA: Dia ruim não zera progresso.', 'REDIRECIONE: Saiu do foco? Sem julgamento, volta.', 'DESCANSO É XP: Descansar é parte do sistema.'] },
    { title: '📱 Tela Saudável', lines: ['Redes sociais: meta < 1h/dia somando todas.', 'Jogos: < 30min ou zero. Recompensa, não refúgio.', 'Dica: deslogue das redes, modo foco, app de estudo na home.'] },
  ];
  return s.map(sec => `<div class="rule-card"><h3>${sec.title}</h3>${sec.lines.map(l => `<p>${l}</p>`).join('')}</div>`).join('');
}

function renderExport() {
  const totalChecks = Object.values(state.weeks).reduce((s, wk) => s + Object.values(wk).filter(Boolean).length, 0);
  const pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]').length;
  const isCloud = supabaseUrl && supabaseUrl !== 'skip';

  return `
    <div class="rule-card">
      <h3>📊 Seus Dados</h3>
      <p>Semanas registradas: <strong>${Object.keys(state.weeks).length}</strong></p>
      <p>Tarefas concluídas: <strong>${totalChecks}</strong></p>
      <p>XP total: <strong>${calcTotalXP()}</strong></p>
      ${pending > 0 ? `<p style="color:var(--accent-amber)">⏳ Operações pendentes de sync: <strong>${pending}</strong></p>` : ''}
      <p style="margin-top:12px;color:var(--text-muted);font-size:12px">
        ${isCloud ? '☁️ Dados sincronizados com Supabase + backup local.' : '💾 Dados salvos localmente no navegador.'}
      </p>
    </div>

    <div class="export-bar">
      <button class="export-btn" onclick="exportCSV()">📊 Exportar CSV</button>
      <button class="export-btn" onclick="exportJSON()">📦 Exportar JSON</button>
      <button class="export-btn" onclick="importData()">📥 Importar JSON</button>
      ${isCloud ? `<button class="export-btn" onclick="fullSync()">🔄 Forçar Sync</button>` : ''}
      ${isCloud ? `<button class="export-btn" onclick="disconnectCloud()">☁️ Desconectar Nuvem</button>` : `<button class="export-btn" onclick="reconnectCloud()">☁️ Conectar Nuvem</button>`}
      <button class="export-btn danger" onclick="resetData()">🗑️ Resetar Tudo</button>
    </div>

    <div class="rule-card" style="margin-top:14px">
      <h3>💡 Dicas</h3>
      <p><strong>CSV</strong> — Abra no Pandas, Excel ou Sheets para análise.</p>
      <p><strong>JSON</strong> — Backup completo. Restaure em qualquer dispositivo.</p>
      <p><strong>Sync</strong> — Dados sincronizam automaticamente. Use "Forçar Sync" se algo parecer desatualizado.</p>
    </div>`;
}

function reconnectCloud() {
  localStorage.removeItem(CONFIG_KEY);
  supabaseUrl = '';
  supabaseKey = '';
  renderSetup();
}

// ===== INIT =====
async function init() {
  const hasConfig = loadConfig();
  
  if (hasConfig && supabaseUrl !== 'skip') {
    render();
    // Async sync on load
    const ok = await testConnection();
    if (ok) {
      isOnline = true;
      await fullSync();
    } else {
      isOnline = false;
    }
    render();
  } else {
    render();
  }

  // Periodic sync every 60s
  setInterval(async () => {
    if (supabaseUrl && supabaseUrl !== 'skip') {
      await flushPending();
    }
  }, 60000);

  // Sync on visibility change (user comes back to tab)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && supabaseUrl && supabaseUrl !== 'skip') {
      fullSync();
    }
  });
}

init();
</script>
</body>
</html>
